name: notification-cleanup

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: app

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma generate

      - name: Repair notification archive schema
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: pnpm prisma db execute --schema prisma/schema.prisma --file scripts/sql/notification-archive-repair.sql

      - name: Cleanup archived notifications
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NOTIFICATION_RETENTION_DAYS: "90"
        run: pnpm db:cleanup:notifications
