name: notification-cleanup

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: app

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cleanup archived notifications
        if: ${{ secrets.DATABASE_URL != '' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NOTIFICATION_RETENTION_DAYS: "3"
        run: pnpm db:cleanup:notifications

      - name: Skip cleanup when DATABASE_URL is missing
        if: ${{ secrets.DATABASE_URL == '' }}
        run: |
          echo "DATABASE_URL secret is missing."
          echo "Skipping notification cleanup run."
